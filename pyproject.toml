[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "mlx: optional local Apple Silicon MLX tests",
]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
