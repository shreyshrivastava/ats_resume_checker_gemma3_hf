name: CI

on:
  push:
    branches:
      - main
      - streamlit-cloud
      - "agent/**"
  pull_request:
    branches:
      - main
      - streamlit-cloud

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      ATS_ENABLE_MLX: "0"
      ATS_MAX_PDF_BYTES: "8388608"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Compile Python files
        run: python -m compileall app.py backend frontend utils evaluation benchmarks tests

      - name: Run tests
        run: pytest -m "not mlx"

      - name: Run evaluation smoke
        run: python evaluation/run_evaluation.py

      - name: Run benchmark smoke
        run: python benchmarks/run_benchmarks.py --iterations 1
